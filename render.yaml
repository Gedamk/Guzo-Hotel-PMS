databases:
  - name: guzo-hotel-pms-db
    plan: free
    databaseName: guzo_db
    user: guzo_user

services:
  - type: web
    name: guzo-hotel-pms-api
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn guzo_backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: guzo-hotel-pms-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SECRET_KEY
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: GUZO_JWT_SECRET
        sync: false
      - key: GUZO_DEFAULT_ADMIN_PASSWORD
        sync: false
